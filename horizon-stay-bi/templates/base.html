<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizon Stay BI - {% block title %}Panel de Control{% endblock %}</title>
    <meta name="description" content="Horizon Stay BI - Panel moderno de Inteligencia de Negocios para Hoteles">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-hotel logo-icon"></i>
                    <h2>Horizon<span>Stay</span></h2>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <p class="nav-title">MENÚ PRINCIPAL</p>
                <ul class="nav-list">
                    <li class="nav-item {% if request.endpoint == 'index' %}active{% endif %}">
                        <a href="{{ url_for('index') }}" class="nav-link">
                            <i class="fa-solid fa-chart-pie"></i>
                            <span>Panel de Control</span>
                        </a>
                    </li>
                    <li class="nav-item {% if request.endpoint == 'clientes' %}active{% endif %}">
                        <a href="{{ url_for('clientes') }}" class="nav-link">
                            <i class="fa-solid fa-users"></i>
                            <span>Clientes</span>
                        </a>
                    </li>
                    <li class="nav-item {% if request.endpoint == 'reservas' %}active{% endif %}">
                        <a href="{{ url_for('reservas') }}" class="nav-link">
                            <i class="fa-solid fa-calendar-check"></i>
                            <span>Reservas</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="fa-solid fa-bed"></i>
                            <span>Habitaciones</span>
                        </a>
                    </li>
                </ul>

                <p class="nav-title">ANALÍTICA</p>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="fa-solid fa-money-bill-trend-up"></i>
                            <span>Ingresos</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="fa-solid fa-chart-line"></i>
                            <span>Informes</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link">
                            <i class="fa-solid fa-gear"></i>
                            <span>Configuración</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://i.pravatar.cc/150?img=33" alt="Usuario Administrador" class="user-avatar">
                    <div class="user-info">
                        <h4>Jane Doe</h4>
                        <p>Gerente General</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="top-navbar">
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" placeholder="Buscar reservas, clientes, informes...">
                </div>
                
                <div class="navbar-actions">
                    <button class="action-btn">
                        <i class="fa-solid fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </button>
                    <button class="action-btn">
                        <i class="fa-solid fa-envelope"></i>
                        <span class="notification-badge">5</span>
                    </button>
                    <button class="primary-btn">
                        <i class="fa-solid fa-plus"></i> Nueva Reserva
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
